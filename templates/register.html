{% extends "base.html" %}

{% block title %}Register - Flask Auth App{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Register</h2>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form" autocomplete="off">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required 
                   placeholder="Enter your username" autocomplete="off" value="">
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required 
                   placeholder="Enter your password" autocomplete="off" value="">
        </div>
        
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    
    <p class="auth-link">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Clear any autofilled values
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    
    // Additional measure: clear fields after a tiny delay to catch late autofills
    setTimeout(function() {
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }, 100);
});
</script>
{% endblock %}
